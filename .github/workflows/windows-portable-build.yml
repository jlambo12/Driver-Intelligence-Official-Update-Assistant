name: Build Windows Portable App

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-portable:
    runs-on: windows-latest
    env:
      PROJECT_PATH: src/DriverGuardian.UI.Wpf/DriverGuardian.UI.Wpf.csproj
      SOLUTION_PATH: DriverGuardian.sln
      ARTIFACT_PATH: artifacts/DriverGuardian-win-x64
      LOG_PATH: artifacts/logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Print .NET environment
        shell: pwsh
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Create build logs directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path "${{ github.workspace }}/${{ env.LOG_PATH }}" -Force | Out-Null

      - name: Restore solution
        id: restore
        shell: pwsh
        run: |
          & dotnet restore "${{ env.SOLUTION_PATH }}" *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/restore.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Restore WPF app project (win-x64)
        id: restore_wpf_runtime
        shell: pwsh
        run: |
          & dotnet restore "${{ env.PROJECT_PATH }}" --runtime win-x64 *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/restore-wpf-runtime.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build WPF app project (Release)
        id: build
        shell: pwsh
        run: |
          & dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --runtime win-x64 --no-restore `
            -bl:"${{ github.workspace }}/${{ env.LOG_PATH }}/build.binlog" *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/build.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run unit tests
        id: test
        shell: pwsh
        run: |
          & dotnet test "tests/DriverGuardian.Tests.Unit/DriverGuardian.Tests.Unit.csproj" --configuration Release `
            --no-restore `
            --collect "XPlat Code Coverage" `
            --results-directory "${{ github.workspace }}/${{ env.LOG_PATH }}/TestResults" `
            --logger "trx;LogFileName=unit-tests.trx" *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/test.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Enforce coverage gate (>=70%)
        id: coverage_gate
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Path "${{ github.workspace }}/${{ env.LOG_PATH }}/TestResults" -Recurse -Filter "coverage.cobertura.xml"
          if (-not $coverageFiles) {
            Write-Error "Coverage report not found."
            exit 1
          }

          [double]$totalValidLines = 0
          [double]$totalCoveredLines = 0
          foreach ($coverageFile in $coverageFiles) {
            [xml]$coverageXml = Get-Content -Path $coverageFile.FullName
            [double]$validLines = [double]$coverageXml.coverage.'lines-valid'
            [double]$coveredLines = [double]$coverageXml.coverage.'lines-covered'
            $totalValidLines += $validLines
            $totalCoveredLines += $coveredLines
          }

          if ($totalValidLines -le 0) {
            Write-Error "Coverage report has zero valid lines."
            exit 1
          }

          $coveragePercent = [Math]::Round(($totalCoveredLines / $totalValidLines) * 100, 2)
          $threshold = 70
          "coverage_percent=$coveragePercent" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- unit test line coverage: $coveragePercent% (threshold: $threshold%)"

          if ($coveragePercent -lt $threshold) {
            Write-Error "Coverage gate failed: $coveragePercent% < $threshold%."
            exit 1
          }

      - name: Verify formatting and analyzers
        id: analyzers
        shell: pwsh
        run: |
          & dotnet format "${{ env.SOLUTION_PATH }}" --verify-no-changes --no-restore --verbosity diagnostic *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/dotnet-format.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Dependency vulnerability scan (fail on critical)
        id: security_scan
        shell: pwsh
        run: |
          $reportPath = "${{ github.workspace }}/${{ env.LOG_PATH }}/vulnerable-packages.json"
          & dotnet list "${{ env.SOLUTION_PATH }}" package --vulnerable --include-transitive --format json `
            | Tee-Object -FilePath $reportPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $report = Get-Content -Path $reportPath -Raw | ConvertFrom-Json
          $criticalFindings = @()
          foreach ($project in $report.projects) {
            foreach ($framework in $project.frameworks) {
              $packages = @()
              if ($framework.topLevelPackages) { $packages += $framework.topLevelPackages }
              if ($framework.transitivePackages) { $packages += $framework.transitivePackages }
              foreach ($package in $packages) {
                foreach ($vulnerability in $package.vulnerabilities) {
                  if ($vulnerability.severity -eq "Critical") {
                    $criticalFindings += "$($project.path) :: $($package.id) $($package.resolvedVersion) :: $($vulnerability.advisoryurl)"
                  }
                }
              }
            }
          }

          if ($criticalFindings.Count -gt 0) {
            $criticalFindings | Set-Content -Path "${{ github.workspace }}/${{ env.LOG_PATH }}/critical-vulnerabilities.txt"
            Write-Error "Critical vulnerabilities detected. See critical-vulnerabilities.txt."
            exit 1
          }

      - name: Publish WPF app (win-x64 portable)
        id: publish
        shell: pwsh
        run: |
          & dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --runtime win-x64 --self-contained false --no-restore `
            --output "${{ github.workspace }}/${{ env.ARTIFACT_PATH }}" *>&1 `
            | Tee-Object -FilePath "${{ github.workspace }}/${{ env.LOG_PATH }}/publish.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Inspect publish and artifact directories
        id: inspect_outputs
        if: always()
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}/${{ env.ARTIFACT_PATH }}"
          $artifactDir = $publishDir
          $publishListPath = "${{ github.workspace }}/${{ env.LOG_PATH }}/publish-directory.txt"
          $artifactListPath = "${{ github.workspace }}/${{ env.LOG_PATH }}/artifact-directory.txt"

          if (Test-Path $publishDir) {
            $publishFiles = Get-ChildItem -Path $publishDir -Recurse -File
            "publish_directory_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "publish_file_count=$($publishFiles.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Get-ChildItem -Path $publishDir -Recurse | Select-Object FullName, Length, LastWriteTimeUtc `
              | Format-Table -AutoSize | Out-String | Set-Content -Path $publishListPath
          }
          else {
            "publish_directory_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "publish_file_count=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "Publish directory not found: $publishDir" | Set-Content -Path $publishListPath
          }

          if (Test-Path $artifactDir) {
            $artifactFiles = Get-ChildItem -Path $artifactDir -Recurse -File
            "artifact_directory_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "artifact_file_count=$($artifactFiles.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Get-ChildItem -Path $artifactDir -Recurse | Select-Object FullName, Length, LastWriteTimeUtc `
              | Format-Table -AutoSize | Out-String | Set-Content -Path $artifactListPath
          }
          else {
            "artifact_directory_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "artifact_file_count=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "Artifact directory not found: $artifactDir" | Set-Content -Path $artifactListPath
          }

      - name: Add diagnostics summary
        if: always()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Windows portable build diagnostics"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- restore status: ${{ steps.restore.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- runtime restore status: ${{ steps.restore_wpf_runtime.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- build status: ${{ steps.build.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- test status: ${{ steps.test.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- coverage gate status: ${{ steps.coverage_gate.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- style/analyzers status: ${{ steps.analyzers.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- security scan status: ${{ steps.security_scan.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- publish status: ${{ steps.publish.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- publish directory exists: ${{ steps.inspect_outputs.outputs.publish_directory_exists }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- publish file count: ${{ steps.inspect_outputs.outputs.publish_file_count }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- artifact directory exists: ${{ steps.inspect_outputs.outputs.artifact_directory_exists }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- artifact file count: ${{ steps.inspect_outputs.outputs.artifact_file_count }}"

      - name: Upload portable app artifact
        if: ${{ steps.publish.outcome == 'success' }}
        uses: actions/upload-artifact@v5
        with:
          name: DriverGuardian-win-x64-portable
          path: ${{ github.workspace }}/${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: DriverGuardian-build-logs
          path: ${{ github.workspace }}/${{ env.LOG_PATH }}
          if-no-files-found: warn
