name: Build Windows Portable App

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-portable:
    runs-on: windows-latest
    env:
      PROJECT_PATH: src/DriverGuardian.UI.Wpf/DriverGuardian.UI.Wpf.csproj
      ARTIFACT_PATH: artifacts/DriverGuardian-win-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true

      - name: Restore WPF app project
        run: dotnet restore "${{ env.PROJECT_PATH }}" --runtime win-x64

      - name: Build WPF app project (Release)
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish WPF app (win-x64 portable)
        run: >
          dotnet publish "${{ env.PROJECT_PATH }}"
          --configuration Release
          --runtime win-x64
          --self-contained false
          --no-restore
          /p:UseAppHost=false
          --output "${{ github.workspace }}/${{ env.ARTIFACT_PATH }}"

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: DriverGuardian-win-x64-portable
          path: ${{ github.workspace }}/${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
